<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }

    header {
      background: #1e293b;
      padding: 20px 40px;
      border-bottom: 1px solid #334155;
    }
    header h1 { font-size: 1.5rem; color: #38bdf8; }
    header p { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; }

    .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

    .company-grid {
      display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 40px;
    }
    .company-btn {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s;
    }
    .company-btn:hover, .company-btn.active {
      background: #38bdf8;
      color: #0f172a;
      border-color: #38bdf8;
      font-weight: bold;
    }

    .summary-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .card .label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px; }
    .card .value { font-size: 1.4rem; font-weight: bold; color: #38bdf8; }

    .chart-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 40px;
    }
    .chart-box h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 16px; }

    #placeholder {
      text-align: center;
      padding: 80px 20px;
      color: #475569;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

<header>
  <h1>📈 Stock Intelligence Dashboard</h1>
  <p>Real-time NSE stock data powered by FastAPI</p>
</header>

<div class="container">

  <div class="company-grid" id="companyList">
    <p style="color:#475569">Loading companies...</p>
  </div>

  <div id="placeholder">👆 Select a company above to view its stock data</div>

  <div id="dashboard" style="display:none">
    <div class="summary-cards" id="summaryCards"></div>
    <div class="chart-box">
      <h2>📊 Closing Price — Last 30 Days</h2>
      <canvas id="priceChart"></canvas>
    </div>
    <div class="chart-box">
      <h2>📉 Daily Return — Last 30 Days</h2>
      <canvas id="returnChart"></canvas>
    </div>
  </div>

</div>

<script>
  let priceChart = null;
  let returnChart = null;

  // Load company buttons
  async function loadCompanies() {
    const res = await fetch('/companies');
    const data = await res.json();
    const container = document.getElementById('companyList');
    container.innerHTML = '';
    data.companies.forEach(symbol => {
      const btn = document.createElement('button');
      btn.className = 'company-btn';
      btn.textContent = symbol;
      btn.onclick = () => loadStock(symbol, btn);
      container.appendChild(btn);
    });
  }

  // Load stock data and summary
  async function loadStock(symbol, btn) {
    // Highlight active button
    document.querySelectorAll('.company-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // Fetch both endpoints in parallel
    const [dataRes, summaryRes] = await Promise.all([
      fetch(`/data/${symbol}`),
      fetch(`/summary/${symbol}`)
    ]);
    const stockData = await dataRes.json();
    const summary = await summaryRes.json();

    // Show dashboard, hide placeholder
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    // Summary cards
    document.getElementById('summaryCards').innerHTML = `
      <div class="card"><div class="label">Symbol</div><div class="value">${symbol}</div></div>
      <div class="card"><div class="label">52W High</div><div class="value">₹${summary.week52_high.toFixed(2)}</div></div>
      <div class="card"><div class="label">52W Low</div><div class="value">₹${summary.week52_low.toFixed(2)}</div></div>
      <div class="card"><div class="label">Avg Close</div><div class="value">₹${summary.avg_close}</div></div>
      <div class="card"><div class="label">Trading Days</div><div class="value">${summary.total_days}</div></div>
    `;

    const labels = stockData.data.map(d => d.date);
    const closes = stockData.data.map(d => d.close);
    const returns = stockData.data.map(d => (d.daily_return * 100).toFixed(2));
    const ma7 = stockData.data.map(d => d.moving_avg_7);

    // Price chart
    if (priceChart) priceChart.destroy();
    priceChart = new Chart(document.getElementById('priceChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Close Price',
            data: closes,
            borderColor: '#38bdf8',
            backgroundColor: 'rgba(56,189,248,0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 2,
          },
          {
            label: '7-day MA',
            data: ma7,
            borderColor: '#f59e0b',
            borderDash: [5, 5],
            fill: false,
            tension: 0.3,
            pointRadius: 0,
          }
        ]
      },
      options: { responsive: true, plugins: { legend: { labels: { color: '#e2e8f0' } } }, scales: { x: { ticks: { color: '#94a3b8' } }, y: { ticks: { color: '#94a3b8' } } } }
    });

    // Return chart
    if (returnChart) returnChart.destroy();
    returnChart = new Chart(document.getElementById('returnChart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Daily Return (%)',
          data: returns,
          backgroundColor: returns.map(r => r >= 0 ? 'rgba(34,197,94,0.7)' : 'rgba(239,68,68,0.7)'),
        }]
      },
      options: { responsive: true, plugins: { legend: { labels: { color: '#e2e8f0' } } }, scales: { x: { ticks: { color: '#94a3b8' } }, y: { ticks: { color: '#94a3b8' } } } }
    });
  }

  loadCompanies();
</script>
</body>
</html>
